name: Update outbreak data

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-outbreak-data
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update JSON data
        run: |
          python scripts/update_data.py

      - name: Commit updated data
        run: |
          git config user.name "outbreak-data-bot"
          git config user.email "outbreak-data-bot@users.noreply.github.com"

          git add public/data

          if git diff --cached --quiet; then
            echo "No JSON data changes to commit."
          else
            git commit -m "Update outbreak data"
            git push
          fi