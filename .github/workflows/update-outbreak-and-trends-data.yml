name: Update outbreak and trends data

on:
  schedule:
    - cron: "0 */3 * * *" # يعمل كل 3 ساعات
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-outbreak-and-trends-data
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_SITE_URL: https://hantamap.online
      # ... (باقي المتغيرات البيئية تبقى كما هي) ...

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Update outbreak JSON data from ArcGIS primary source
        id: arcgis_update
        continue-on-error: true
        run: |
          python scripts/update_arcgis_primary.py

      - name: Fallback to official outbreak sources if ArcGIS failed
        if: steps.arcgis_update.outcome == 'failure'
        run: |
          echo "ArcGIS primary update failed. Running official fallback updater..."
          python scripts/update_data.py

      - name: Update trends JSON data
        run: |
          python scripts/update_trends.py

      # 👇 الخطوة الجديدة: توليد الكلمات المفتاحية تلقائياً 👇
      - name: Generate SEO keywords 👈
        run: |
          python scripts/generate_seo_keywords.py

      - name: Verify generated data files
        run: |
          test -f public/data/global.json
          test -f public/data/countries.json
          test -f public/data/points.json
          test -f public/data/timeline.json
          test -f public/data/sources.json
          test -f public/data/official_events.json
          test -f public/data/all_countries.json
          test -f public/data/trends.json
          test -f public/data/latest_articles.json
          test -f public/data/seo-keywords.json # 👈 التأكد من وجود ملف الكلمات

      - name: Commit updated data
        run: |
          git config user.name "outbreak-data-bot"
          git config user.email "outbreak-data-bot@users.noreply.github.com"

          # 👈 إضافة مجلد البيانات بالكامل لضمان شمول ملف الـ SEO
          git add public/data requirements.txt

          if git diff --cached --quiet; then
            echo "No JSON data changes to commit."
          else
            git commit -m "Update outbreak, trends and SEO data"
            git push
          fi